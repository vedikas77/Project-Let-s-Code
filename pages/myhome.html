<script>
function enrollNow(courseName, nextUrl) {
    // We create a temporary form and submit it immediately
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'home.php';

    const courseInput = document.createElement('input');
    courseInput.type = 'hidden';
    courseInput.name = 'course_name';
    courseInput.value = courseName;
    form.appendChild(courseInput);

    const redirectInput = document.createElement('input');
    redirectInput.type = 'hidden';
    redirectInput.name = 'redirect_to';
    redirectInput.value = nextUrl;
    form.appendChild(redirectInput);

    document.body.appendChild(form);
    form.submit();
}
</script>

<form id="enrollForm" action="home.php" method="POST" style="display:none;">

    <script>
    function enroll(name, url) {
        document.getElementById('course_input').value = name;
        document.getElementById('redirect_input').value = url;
