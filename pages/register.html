<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>


<style>
/* YOUR SAME CSS – unchanged */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}
body {
    background: #f2f5e9;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    display: flex;
    width: 750px;
    height: 500px;
    background: #e5ead6;
    border-radius: 14px;
    box-shadow: 0 0 20px rgba(126, 150, 107, 0.6);
    overflow: hidden;
}
.welcome-section {
    width: 45%;
    background: linear-gradient(150deg, #c9d6b5, #9fb48c);
    padding: 40px 30px;
    color: #364732;
    clip-path: polygon(0 0, 100% 0, 70% 100%, 0% 100%);
}
.form-section {
    width: 55%;
    background: #fafcf5;
    padding: 40px;
}
.input-group {
    margin-bottom: 18px;
}
.input-group input {
    width: 100%;
    padding: 10px;
    border: none;
    border-bottom: 2px solid #9fb48c;
    background: transparent;
}
.icon {
    position: absolute;
    right: 10px;
    bottom: 10px;
    opacity: 0.6;
}
.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #b8c9a3, #8ea87a);
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

body.dark {
    background-color: #1e1e1e;
    color: #eaeaea;
}

body.dark .container {
    background-color: #2a2a2a;
}

body.dark .form-section {
    background-color: #333;
}

body.dark input {
    background-color: #2a2a2a;
    color: #eaeaea;
    border-bottom-color: #666;
}

body.dark .btn {
    background: #555;
    color: #fff;
}

</style>
</head>

<body>

<div class="container">
    <div class="welcome-section">
        <h1>LET'S CODE !</h1>
        <p><b>"A challenge a day keeps the bugs away."</b></p>
    </div>

    <div class="form-section">
        <h2>Register</h2>
        <p id="error-msg" style="color: red; margin-bottom: 12px; display:none;"></p>

        <!-- THIS IS THE IMPORTANT PART -->
        <form action="register.php" method="POST">
<div style="position:absolute; top:10px; right:10px;">
    <button onclick="toggleDarkMode()" style="padding:5px 10px; cursor:pointer;">🌙 Dark</button>
</div>
            <div class="input-group" style="position: relative;">
                <label>Username</label>
                <input type="text" name="username" id="username" required>
               
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email"  id="email"  required>
                
            </div>

            <div class="input-group">
                
                
                <div class="input-group" style="position:relative;">
    <label>Password</label>
    <input type="password" id="password" name="password" required>
    <span id="togglePassword" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">🙈</span>
</div>
            </div>

            <button class="btn" type="submit">Sign Up</button>

        </form>

        <p class="login-text">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>
<script>
    //theme
function toggleDarkMode() {
    document.body.classList.toggle("dark");

    // Save preference
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

// Load theme on page load
if(localStorage.getItem('theme') === 'dark'){
    document.body.classList.add('dark');
}
//eye
const togglePassword = document.querySelector('#togglePassword');
const password = document.querySelector('#password');

togglePassword.addEventListener('click', function () {
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    
    // Optional: change icon
    this.textContent = type === 'password' ? '🙈' : '👁️';
});

//other
document.querySelector("form").addEventListener("submit", function(e) {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("error-msg");

    errorMsg.style.display = "none";

    // Username validation
    if (username.length < 3 || username.includes(" ")) {
        showError("Username must be at least 3 characters and contain no spaces");
        e.preventDefault();
        return;
    }

    // Email validation
   const forbiddenChars = /[!#$%^&*(),+=\[\]{}:;"'<>\?/\\|~]/;
const emailPattern = /^[A-Za-z0-9][A-Za-z0-9._]*@[A-Za-z0-9][A-Za-z0-9._]*\.[A-Za-z]{2,}$/;

if (email.startsWith('_') || email.startsWith('.') || email.startsWith('@')) {
    showError("Email cannot start with '_', '.' or '@'");
    e.preventDefault();
    return;
}

if (forbiddenChars.test(email)) {
    showError("Email can only contain letters, numbers, dot (.) and underscore (_)");
    e.preventDefault();
    return;
}

if (!emailPattern.test(email)) {
    showError("Please enter a valid email address");
    e.preventDefault();
    return;
}
   

    // Password validation
    const specialChar = /[@#&!$%]/;
    const number = /[0-9]/;

    if (password.length < 6 || !specialChar.test(password) || !number.test(password)) {
        showError("Password must be 6+ chararcter, include a number & special symbol (@,#,&)");
        e.preventDefault();
        return;
    }
});

function showError(message) {
    const errorMsg = document.getElementById("error-msg");
    errorMsg.textContent = message;
    errorMsg.style.display = "block";
}
</script>
</body>
</html>
